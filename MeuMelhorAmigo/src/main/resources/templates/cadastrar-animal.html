<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Cadastrar animal')}"></head>
<body>
<header th:replace="~{fragments/layout :: nav('cadastrar')}"></header>

<main class="container page page-mid">
    <a th:href="@{/animais}" class="back-link"><span style="font-size:17px">←</span> Cancelar</a>

    <div class="page-head">
        <div>
            <div class="eyebrow">Novo registro</div>
            <h1>Cadastrar animal</h1>
            <p class="sub">Quanto mais detalhes, maiores as chances de um reencontro.</p>
        </div>
    </div>

    <!-- seletor de tipo -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:26px">
        <button type="button" class="card tipo-card on" data-tipo="perdido" style="text-align:left;padding:18px 20px;cursor:pointer;border-width:2px">
            <div style="font-size:26px;margin-bottom:6px">😿</div>
            <div class="tt" style="font-family:var(--font-display);font-weight:800;font-size:16px">Perdi meu animal</div>
            <div class="muted" style="font-size:13px;margin-top:2px">Registrar um animal que desapareceu</div>
        </button>
        <button type="button" class="card tipo-card" data-tipo="encontrado" style="text-align:left;padding:18px 20px;cursor:pointer;border-width:2px">
            <div style="font-size:26px;margin-bottom:6px">🐾</div>
            <div class="tt" style="font-family:var(--font-display);font-weight:800;font-size:16px">Encontrei um animal</div>
            <div class="muted" style="font-size:13px;margin-top:2px">Registrar um animal achado na rua</div>
        </button>
    </div>

    <div id="erro-foto" class="err-msg" style="display:none"><span>⚠️</span><span id="erro-foto-txt"></span></div>

    <form method="post" th:action="@{/animais/cadastrar}" enctype="multipart/form-data" id="form-animal">
        <input type="hidden" name="tipo" id="tipo" value="perdido"/>

        <!-- informações gerais -->
        <div class="card card-pad" style="margin-bottom:18px">
            <h3 style="font-size:17px;margin-bottom:18px">Informações gerais</h3>

            <div class="field" id="campo-nome">
                <label>Nome do animal</label>
                <input class="inp" name="nome" placeholder="Ex.: Thor"/>
            </div>
            <div class="field-row">
                <div class="field">
                    <label>Espécie</label>
                    <select class="inp" name="especie">
                        <option value="cao">Cão</option>
                        <option value="gato">Gato</option>
                        <option value="passaro">Pássaro</option>
                        <option value="coelho">Coelho</option>
                        <option value="outro">Outro</option>
                    </select>
                </div>
                <div class="field">
                    <label>Raça</label>
                    <input class="inp" name="raca" placeholder="Ex.: SRD, Siamês…" required/>
                </div>
            </div>
            <div class="field-row">
                <div class="field">
                    <label>Cor</label>
                    <input class="inp" name="cor" placeholder="Ex.: Caramelo" required/>
                </div>
                <div class="field">
                    <label>Tamanho</label>
                    <select class="inp" name="tamanho">
                        <option>Pequeno</option><option selected>Médio</option><option>Grande</option>
                    </select>
                </div>
            </div>
            <div class="field-row">
                <div class="field">
                    <label>Sexo</label>
                    <select class="inp" name="sexo">
                        <option>Macho</option><option>Fêmea</option>
                    </select>
                </div>
                <div class="field">
                    <label>Local</label>
                    <input class="inp" name="local" placeholder="Bairro, cidade" required/>
                </div>
            </div>
            <div class="field">
                <label>Descrição</label>
                <textarea class="inp" name="descricao" placeholder="Comportamento, sinais particulares, contexto…" required></textarea>
            </div>
        </div>

        <!-- detalhes: perdido -->
        <div class="card card-pad" style="margin-bottom:18px" id="bloco-perdido">
            <h3 style="font-size:17px;margin-bottom:18px">Detalhes do desaparecimento</h3>
            <div class="field">
                <label>Características marcantes</label>
                <input class="inp" name="caracteristicas" placeholder="Coleira, manchas, microchip…"/>
            </div>
            <div class="field-row">
                <div class="field">
                    <label>Recompensa (opcional)</label>
                    <input class="inp" name="recompensa" placeholder="Ex.: R$ 300"/>
                </div>
                <div class="field">
                    <label>Data do desaparecimento</label>
                    <input class="inp" type="date" name="dataDesaparecimento"/>
                </div>
            </div>
        </div>

        <!-- detalhes: encontrado -->
        <div class="card card-pad" style="margin-bottom:18px;display:none" id="bloco-encontrado">
            <h3 style="font-size:17px;margin-bottom:18px">Detalhes do encontro</h3>
            <div class="field">
                <label>Condição de saúde</label>
                <input class="inp" name="condicaoSaude" placeholder="Ex.: Boa, sem ferimentos"/>
            </div>
            <div class="field-row">
                <div class="field">
                    <label>Local do encontro</label>
                    <input class="inp" name="localEncontro" placeholder="Onde foi achado"/>
                </div>
                <div class="field">
                    <label>Data do encontro</label>
                    <input class="inp" type="date" name="dataEncontro"/>
                </div>
            </div>
        </div>

        <!-- foto -->
        <div class="card card-pad" style="margin-bottom:22px">
            <h3 style="font-size:17px;margin-bottom:14px">Foto</h3>
            <label style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;border:2px dashed var(--line);border-radius:14px;padding:28px;cursor:pointer;background:var(--surface-2);text-align:center">
                <span style="font-size:30px">📷</span>
                <span id="foto-nome" style="font-weight:700;color:var(--ink-2)">Clique para enviar uma foto</span>
                <span class="hint">JPG ou PNG · máx. 5MB</span>
                <input type="file" name="foto" accept="image/*" style="display:none" id="foto"/>
            </label>
        </div>

        <div style="display:flex;gap:12px;justify-content:flex-end">
            <a th:href="@{/animais}" class="btn btn-ghost btn-lg">Cancelar</a>
            <button type="submit" class="btn btn-primary btn-lg">Publicar registro</button>
        </div>
    </form>
</main>

<footer th:replace="~{fragments/layout :: foot}"></footer>

<script th:inline="none">
    (function () {
        const tipoInput = document.getElementById('tipo');
        const blocoP = document.getElementById('bloco-perdido');
        const blocoE = document.getElementById('bloco-encontrado');
        const campoNome = document.getElementById('campo-nome');
        const cards = document.querySelectorAll('.tipo-card');

        function selectTipo(t) {
            tipoInput.value = t;
            cards.forEach(function (c) {
                const on = c.dataset.tipo === t;
                c.classList.toggle('on', on);
                c.style.borderColor = on ? 'var(--brand)' : 'var(--line)';
                c.style.background = on ? 'var(--brand-bg)' : 'var(--surface)';
                const tt = c.querySelector('.tt');
                if (tt) tt.style.color = on ? 'var(--brand-ink)' : 'var(--ink)';
            });
            const perdido = t === 'perdido';
            blocoP.style.display = perdido ? '' : 'none';
            blocoE.style.display = perdido ? 'none' : '';
            campoNome.style.display = perdido ? '' : 'none';
        }

        cards.forEach(function (c) { c.addEventListener('click', function () { selectTipo(c.dataset.tipo); }); });
        selectTipo('perdido');

        const foto = document.getElementById('foto');
        const fotoNome = document.getElementById('foto-nome');
        const erro = document.getElementById('erro-foto');
        const erroTxt = document.getElementById('erro-foto-txt');
        foto.addEventListener('change', function () {
            const f = foto.files[0];
            if (!f) { fotoNome.textContent = 'Clique para enviar uma foto'; return; }
            if (f.size > 5 * 1024 * 1024) {
                erroTxt.textContent = 'A foto deve ter no máximo 5MB.';
                erro.style.display = '';
                foto.value = '';
                fotoNome.textContent = 'Clique para enviar uma foto';
                return;
            }
            erro.style.display = 'none';
            fotoNome.textContent = f.name;
        });
    })();
</script>
</body>
</html>
