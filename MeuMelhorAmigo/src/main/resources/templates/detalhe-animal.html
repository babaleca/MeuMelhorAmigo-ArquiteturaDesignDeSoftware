<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Detalhe do animal - MeuMelhorAmigo</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 24px; color: #222; }
        h1 { color: #2c6e49; }
        img { max-width: 360px; border-radius: 8px; background: #eee; }
        table { border-collapse: collapse; margin-top: 12px; }
        td { padding: 6px 12px; border-bottom: 1px solid #eee; }
        td.label { font-weight: bold; width: 180px; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; color: #fff; background: #2c6e49; }
    </style>
</head>
<body>
<a th:href="@{/animais}">&larr; Voltar para a lista</a>
<h1>Detalhe do animal</h1>

<img th:if="${animal.foto != null}" th:src="@{${animal.foto}}" alt="foto"/>
<img th:unless="${animal.foto != null}" src="https://placehold.co/360x240?text=Sem+foto" alt="sem foto"/>

<table>
    <tr><td class="label">Status</td><td><span class="badge" th:text="${animal.status}"></span></td></tr>
    <tr><td class="label">Espécie</td><td th:text="${animal.especie}"></td></tr>
    <tr><td class="label">Raça</td><td th:text="${animal.raca}"></td></tr>
    <tr><td class="label">Cor</td><td th:text="${animal.cor}"></td></tr>
    <tr><td class="label">Tamanho</td><td th:text="${animal.tamanho}"></td></tr>
    <tr><td class="label">Sexo</td><td th:text="${animal.sexo}"></td></tr>
    <tr><td class="label">Local</td><td th:text="${animal.local}"></td></tr>
    <tr><td class="label">Data de registro</td><td th:text="${#temporals.format(animal.dataRegistro, 'dd/MM/yyyy HH:mm')}"></td></tr>
    <tr><td class="label">Descrição</td><td th:text="${animal.descricao}"></td></tr>

    <!-- Campos especificos de Animal Encontrado -->
    <th:block th:if="${animal instanceof T(com.bigr.meumelhoramigo.modelo.AnimalEncontrado)}">
        <tr><td class="label">Data do encontro</td><td th:text="${animal.dataEncontro}"></td></tr>
        <tr><td class="label">Local do encontro</td><td th:text="${animal.localEncontro}"></td></tr>
        <tr><td class="label">Condição de saúde</td><td th:text="${animal.condicaoSaude}"></td></tr>
    </th:block>

    <!-- Campos especificos de Animal Perdido -->
    <th:block th:if="${animal instanceof T(com.bigr.meumelhoramigo.modelo.AnimalPerdido)}">
        <tr><td class="label">Nome</td><td th:text="${animal.nome}"></td></tr>
        <tr><td class="label">Data do desaparecimento</td><td th:text="${animal.dataDesaparecimento}"></td></tr>
        <tr><td class="label">Características</td><td th:text="${animal.caracteristicas}"></td></tr>
        <tr><td class="label">Recompensa</td><td th:text="${animal.recompensa}"></td></tr>
    </th:block>

    <tr th:if="${animal.responsavel != null}">
        <td class="label">Responsável</td><td th:text="${animal.responsavel.nome}"></td>
    </tr>
</table>
</body>
</html>
