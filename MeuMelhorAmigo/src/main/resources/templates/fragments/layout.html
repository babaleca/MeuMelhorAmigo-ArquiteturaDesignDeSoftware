<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<!--
  Fragmento de layout do MeuMelhorAmigo (design system "app.css").
  Uso nas páginas:
    <head th:replace="~{fragments/layout :: head('Título')}"></head>
    <header th:replace="~{fragments/layout :: nav('animais')}"></header>
    <footer th:replace="~{fragments/layout :: foot}"></footer>
-->

<!-- ============================ HEAD ============================ -->
<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${title} + ' · MeuMelhorAmigo'">MeuMelhorAmigo</title>

    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>

    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>

<body>

<!-- ============================ HEADER / NAV ============================ -->
<header class="hd" th:fragment="nav(active)">
    <div class="container hd-in">
        <a th:href="@{/animais}" class="brand">
            <span class="brand-mark"><img th:src="@{/images/logon.png}" alt="MeuMelhorAmigo"/></span>
            <span>MeuMelhorAmigo<small>perdidos · encontrados · adoção</small></span>
        </a>

        <nav class="nav" sec:authorize="isAuthenticated()">
            <a th:href="@{/animais}" th:classappend="${active == 'animais'} ? ' active' : ''">Animais</a>
            <a th:href="@{/animais/cadastrar}" th:classappend="${active == 'cadastrar'} ? ' active' : ''">Cadastrar</a>
            <a th:href="@{/notificacoes}" th:classappend="${active == 'notificacoes'} ? ' active' : ''">
                Notificações
                <span class="dot" th:if="${unreadCount != null and unreadCount > 0}" th:text="${unreadCount}">0</span>
            </a>
            <a th:href="@{/adocao/minhas-solicitacoes}" th:classappend="${active == 'adocoes'} ? ' active' : ''">
                Solicitações
                <span class="dot" th:if="${pendingReceivedCount != null and pendingReceivedCount > 0}" th:text="${pendingReceivedCount}">0</span>
            </a>
            <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin/painel}" th:classappend="${active == 'admin'} ? ' active' : ''">Admin</a>
        </nav>

        <div class="hd-spacer"></div>

        <div class="hd-user">
            <span sec:authorize="isAuthenticated()" class="avatar"
                  th:style="|background:${#view.avatarColor(currentUser != null ? currentUser.nome : 'U')}|"
                  th:text="${currentUser != null ? #view.initials(currentUser.nome) : ''}">AB</span>
            <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post" style="margin:0">
                <button type="submit" class="btn btn-ghost btn-sm">Sair</button>
            </form>
            <a sec:authorize="!isAuthenticated()" th:href="@{/login}" class="btn btn-primary btn-sm">Entrar</a>
        </div>
    </div>
</header>

<!-- ============================ FOOTER ============================ -->
<footer class="site-foot" th:fragment="foot">
    <div class="container">
        <span style="font-family:var(--font-display);font-weight:800;color:var(--ink-2)">MeuMelhorAmigo</span>
        <span>Protótipo · perdidos, encontrados e adoção responsável</span>
    </div>
</footer>

<!-- Fragmento vazio para compatibilidade com telas ainda não migradas -->
<div th:fragment="motion"></div>

</body>
</html>
