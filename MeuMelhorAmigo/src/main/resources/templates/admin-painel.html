<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Painel admin')}"></head>
<body>
<header th:replace="~{fragments/layout :: nav('admin')}"></header>

<main class="container page">
    <div class="page-head">
        <div>
            <div class="eyebrow">Administração</div>
            <h1>Painel do administrador</h1>
            <p class="sub">Visão geral do sistema, animais e usuários.</p>
        </div>
    </div>

    <div th:if="${sucesso}" class="ok-msg"><span>✓</span><span th:text="${sucesso}">ok</span></div>

    <!-- estatísticas -->
    <div class="stat-grid">
        <div class="card card-pad stat" style="padding:18px 20px">
            <div class="n" style="color:var(--brand-ink)" th:text="${totalAnimais}">0</div>
            <div class="muted" style="font-size:13px;font-weight:700">Animais no sistema</div>
        </div>
        <div class="card card-pad stat" style="padding:18px 20px">
            <div class="n" style="color:var(--st-disp)" th:text="${totalDisp}">0</div>
            <div class="muted" style="font-size:13px;font-weight:700">Disponíveis</div>
        </div>
        <div class="card card-pad stat" style="padding:18px 20px">
            <div class="n" style="color:var(--st-enc)" th:text="${totalPerdEnc}">0</div>
            <div class="muted" style="font-size:13px;font-weight:700">Perdidos/Encontrados</div>
        </div>
        <div class="card card-pad stat" style="padding:18px 20px">
            <div class="n" style="color:var(--ink)" th:text="${totalUsuarios}">0</div>
            <div class="muted" style="font-size:13px;font-weight:700">Usuários</div>
        </div>
    </div>

    <div class="tabs" style="margin-bottom:20px">
        <button class="tab on" id="tab-animais" type="button">Animais</button>
        <button class="tab" id="tab-usuarios" type="button">Usuários</button>
    </div>

    <!-- ANIMAIS -->
    <div class="card" style="overflow:hidden" id="painel-animais">
        <table class="tbl">
            <thead><tr><th>Animal</th><th>Espécie</th><th>Status</th><th>Local</th><th>Registro</th><th></th></tr></thead>
            <tbody>
                <tr th:each="a : ${animais}">
                    <td style="font-weight:700" th:text="${#view.nome(a)}">Nome</td>
                    <td><span th:text="${#view.speciesGlyph(a.especie)}">🐾</span> <span th:text="${#view.speciesLabel(a.especie)}">Cão</span></td>
                    <td>
                        <span class="badge" th:classappend="${#view.statusClass(a.status)}">
                            <span class="bdot"></span><span th:text="${#view.statusLabel(a.status)}">Status</span>
                        </span>
                    </td>
                    <td style="color:var(--ink-2)" th:text="${a.local}">Local</td>
                    <td style="color:var(--ink-3)" th:text="${#view.fmtDateTime(a.dataRegistro)}">data</td>
                    <td style="text-align:right">
                        <a th:href="@{'/animais/' + ${a.id}}" class="btn btn-ghost btn-sm">Ver</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- USUÁRIOS -->
    <div class="card" style="overflow:hidden;display:none" id="painel-usuarios">
        <table class="tbl">
            <thead><tr><th>Usuário</th><th>Email</th><th>Papel</th><th>Status</th><th></th></tr></thead>
            <tbody>
                <tr th:each="u : ${usuarios}">
                    <td>
                        <div style="display:flex;align-items:center;gap:10px">
                            <span class="avatar" style="width:30px;height:30px;font-size:12px"
                                  th:style="|background:${#view.avatarColor(u.nome)};width:30px;height:30px;font-size:12px|"
                                  th:text="${#view.initials(u.nome)}">AB</span>
                            <b th:text="${u.nome}">Nome</b>
                        </div>
                    </td>
                    <td style="color:var(--ink-2)" th:text="${u.email}">email</td>
                    <td><span class="badge badge-soft" th:text="${u.role == 'ROLE_ADMIN' ? 'Admin' : 'Usuário'}">Papel</span></td>
                    <td>
                        <span th:if="${u.ativo}" class="badge disp"><span class="bdot"></span>Ativo</span>
                        <span th:unless="${u.ativo}" class="badge adot"><span class="bdot"></span>Inativo</span>
                    </td>
                    <td style="text-align:right">
                        <form method="post" th:action="@{|/admin/usuarios/${u.id}/toggle-ativo|}" style="margin:0;display:inline">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="btn btn-sm" th:classappend="${u.ativo ? 'btn-danger' : 'btn-leaf'}"
                                    th:text="${u.ativo ? 'Desativar' : 'Ativar'}">Alternar</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</main>

<footer th:replace="~{fragments/layout :: foot}"></footer>

<script th:inline="none">
    (function () {
        const tA = document.getElementById('tab-animais');
        const tU = document.getElementById('tab-usuarios');
        const pA = document.getElementById('painel-animais');
        const pU = document.getElementById('painel-usuarios');
        function show(which) {
            const an = which === 'animais';
            tA.classList.toggle('on', an);
            tU.classList.toggle('on', !an);
            pA.style.display = an ? '' : 'none';
            pU.style.display = an ? 'none' : '';
        }
        tA.addEventListener('click', function () { show('animais'); });
        tU.addEventListener('click', function () { show('usuarios'); });
    })();
</script>
</body>
</html>
