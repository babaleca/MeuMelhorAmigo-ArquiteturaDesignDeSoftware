<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Painel Admin - MeuMelhorAmigo</title>
</head>
<body>
<nav style="background:#2c6e49; padding:10px 24px; margin-bottom:20px;">
    <a href="/animais" style="color:#fff; margin-right:16px; text-decoration:none;">Animais</a>
    <a href="/animais/cadastrar" style="color:#fff; margin-right:16px; text-decoration:none;">+ Cadastrar Animal</a>
    <a href="/notificacoes" style="color:#fff; margin-right:16px; text-decoration:none;">Notificações</a>
    <a href="/adocao/minhas-solicitacoes" style="color:#fff; margin-right:16px; text-decoration:none;">Minhas Solicitações</a>
    <a href="/admin/painel" style="color:#fff; margin-right:16px; text-decoration:none;">Admin</a>
    <a href="/logout" style="color:#fff; float:right; text-decoration:none;">Sair</a>
</nav>
<h1>MeuMelhorAmigo — Painel Administrativo</h1>

<div th:if="${sucesso}" style="color: green;">
    <p th:text="${sucesso}"></p>
</div>

<h2>Animais cadastrados</h2>
<table border="1">
    <tr>
        <th>ID</th>
        <th>Espécie</th>
        <th>Raça</th>
        <th>Status</th>
        <th>Responsável</th>
        <th>Data</th>
    </tr>
    <tr th:each="animal : ${animais}">
        <td th:text="${animal.id}"></td>
        <td th:text="${animal.especie}"></td>
        <td th:text="${animal.raca}"></td>
        <td th:text="${animal.status}"></td>
        <td th:text="${animal.responsavel != null ? animal.responsavel.nome : '-'}"></td>
        <td th:text="${animal.dataRegistro}"></td>
    </tr>
</table>

<h2>Usuários cadastrados</h2>
<table border="1">
    <tr>
        <th>ID</th>
        <th>Nome</th>
        <th>Email</th>
        <th>Role</th>
        <th>Ativo</th>
        <th>Ação</th>
    </tr>
    <tr th:each="usuario : ${usuarios}">
        <td th:text="${usuario.id}"></td>
        <td th:text="${usuario.nome}"></td>
        <td th:text="${usuario.email}"></td>
        <td th:text="${usuario.role}"></td>
        <td th:text="${usuario.ativo ? 'Sim' : 'Não'}"></td>
        <td>
            <form th:action="@{/admin/usuarios/{id}/toggle-ativo(id=${usuario.id})}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" th:text="${usuario.ativo ? 'Desativar' : 'Ativar'}"></button>
            </form>
        </td>
    </tr>
</table>

<br/>
<a href="/animais">← Voltar para animais</a>
<a href="/logout">Sair</a>
</body>
</html>
