<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Notificações')}"></head>
<body>
<header th:replace="~{fragments/layout :: nav('notificacoes')}"></header>

<main class="container page page-narrow">
    <div class="page-head">
        <div>
            <div class="eyebrow">Avisos</div>
            <h1>Notificações</h1>
            <p class="sub" th:if="${unreadCount != null and unreadCount > 0}"
               th:text="'Você tem ' + ${unreadCount} + ' notificação(ões) não lida(s).'">Você tem avisos.</p>
            <p class="sub" th:unless="${unreadCount != null and unreadCount > 0}">Você está em dia.</p>
        </div>
    </div>

    <div th:if="${notificacoes.isEmpty()}" class="empty card card-pad">
        <div class="big">🔕</div>
        <h3>Sem notificações</h3>
        <p>Avisos sobre correspondências e adoções aparecerão aqui.</p>
    </div>

    <div style="display:flex;flex-direction:column;gap:11px" th:unless="${notificacoes.isEmpty()}">
        <div th:each="n : ${notificacoes}" class="card"
             th:style="|display:flex;gap:14px;padding:15px 17px;align-items:flex-start;border-left:4px solid ${n.lida ? 'var(--line)' : 'var(--brand)'};background:${n.lida ? 'var(--surface)' : 'var(--brand-bg)'}|">
            <div style="font-size:22px;line-height:1.4">
                <span th:switch="${n.tipo}">
                    <span th:case="'CORRESPONDENCIA'">🔔</span>
                    <span th:case="'ADOCAO'">🐾</span>
                    <span th:case="'SISTEMA'">✅</span>
                    <span th:case="*">🔔</span>
                </span>
            </div>
            <div style="flex:1">
                <p th:style="|margin:0;font-size:14.5px;color:var(--ink);font-weight:${n.lida ? 500 : 700}|"
                   th:text="${n.mensagem}">Mensagem</p>
                <div style="margin-top:8px">
                    <span class="muted" style="font-size:12.5px;font-weight:700" th:text="${#view.fmtDateTime(n.dataEnvio)}">data</span>
                </div>
            </div>
            <form th:if="${!n.lida}" method="post" th:action="@{|/notificacoes/${n.id}/lida|}" style="margin:0">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-ghost btn-sm">Marcar como lida</button>
            </form>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: foot}"></footer>
</body>
</html>
