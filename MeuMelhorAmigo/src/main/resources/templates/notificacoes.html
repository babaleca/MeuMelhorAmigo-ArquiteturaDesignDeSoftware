<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Notificações - MeuMelhorAmigo</title>
</head>
<body>
<nav style="background:#2c6e49; padding:10px 24px; margin-bottom:20px;">
    <a href="/animais" style="color:#fff; margin-right:16px; text-decoration:none;">Animais</a>
    <a href="/animais/cadastrar" style="color:#fff; margin-right:16px; text-decoration:none;">+ Cadastrar Animal</a>
    <a href="/notificacoes" style="color:#fff; margin-right:16px; text-decoration:none;">Notificações</a>
    <a href="/adocao/minhas-solicitacoes" style="color:#fff; margin-right:16px; text-decoration:none;">Minhas Solicitações</a>
    <a href="/admin/painel" style="color:#fff; margin-right:16px; text-decoration:none;">Admin</a>
    <a href="/logout" style="color:#fff; float:right; text-decoration:none;">Sair</a>
</nav>
<h1>MeuMelhorAmigo</h1>
<h2>Minhas Notificações</h2>

<div th:if="${#lists.isEmpty(notificacoes)}">
    <p>Você não tem notificações.</p>
</div>

<table th:unless="${#lists.isEmpty(notificacoes)}" border="1">
    <tr>
        <th>Mensagem</th>
        <th>Tipo</th>
        <th>Data</th>
        <th>Lida</th>
        <th>Ação</th>
    </tr>
    <tr th:each="n : ${notificacoes}">
        <td th:text="${n.mensagem}"></td>
        <td th:text="${n.tipo}"></td>
        <td th:text="${n.dataEnvio}"></td>
        <td th:text="${n.lida ? 'Sim' : 'Não'}"></td>
        <td>
            <form th:if="${!n.lida}" th:action="@{/notificacoes/{id}/lida(id=${n.id})}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit">Marcar como lida</button>
            </form>
        </td>
    </tr>
</table>

<br/>
<a href="/animais">← Voltar para animais</a>
</body>
</html>
