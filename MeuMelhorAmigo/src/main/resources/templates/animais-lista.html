<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Animais - MeuMelhorAmigo</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 24px; color: #222; }
        h1 { color: #2c6e49; }
        .filtros { margin: 16px 0; padding: 12px; background: #f4f4f4; border-radius: 8px; }
        .filtros input, .filtros select { padding: 6px; margin-right: 8px; }
        .grid { display: flex; flex-wrap: wrap; gap: 16px; }
        .card { border: 1px solid #ddd; border-radius: 8px; width: 220px; overflow: hidden; }
        .card img { width: 100%; height: 150px; object-fit: cover; background: #eee; }
        .card .body { padding: 10px; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 12px; color: #fff; background: #2c6e49; }
        a.btn { display: inline-block; padding: 8px 14px; background: #2c6e49; color: #fff; text-decoration: none; border-radius: 6px; }
    </style>
</head>
<body>
<body>
<nav style="background:#2c6e49; padding:10px 24px; margin-bottom:20px;">
    <a href="/animais" style="color:#fff; margin-right:16px; text-decoration:none;">Animais</a>
    <a href="/animais/cadastrar" style="color:#fff; margin-right:16px; text-decoration:none;">+ Cadastrar Animal</a>
    <a href="/notificacoes" style="color:#fff; margin-right:16px; text-decoration:none;">Notificações</a>
    <a href="/adocao/minhas-solicitacoes" style="color:#fff; margin-right:16px; text-decoration:none;">Minhas Solicitações</a>
    <a href="/admin/painel" style="color:#fff; margin-right:16px; text-decoration:none;">Admin</a>
    <a href="/logout" style="color:#fff; float:right; text-decoration:none;">Sair</a>
</nav>
<h1>Animais cadastrados</h1>
<a class="btn" th:href="@{/animais/cadastrar}">+ Cadastrar animal</a>

<form class="filtros" method="get" th:action="@{/animais}">
    <input type="text" name="especie" placeholder="Espécie (cão, gato...)" th:value="${especie}"/>
    <select name="status">
        <option value="">Todos os status</option>
        <option th:each="s : ${statusValores}" th:value="${s}" th:text="${s}"
                th:selected="${s == status}"></option>
    </select>
    <button type="submit">Filtrar</button>
</form>

<div class="grid">
    <div class="card" th:each="a : ${animais}">
        <a th:href="@{'/animais/' + ${a.id}}">
            <img th:if="${a.foto != null}" th:src="@{${a.foto}}" alt="foto"/>
            <img th:unless="${a.foto != null}" src="https://placehold.co/220x150?text=Sem+foto" alt="sem foto"/>
        </a>
        <div class="body">
            <span class="badge" th:text="${a.status}"></span>
            <p><strong th:text="${a.especie}"></strong>
                <span th:if="${a.raca != null}" th:text="' - ' + ${a.raca}"></span></p>
            <p th:if="${a.local != null}" th:text="'Local: ' + ${a.local}"></p>
            <a th:href="@{'/animais/' + ${a.id}}">Ver detalhes</a>
        </div>
    </div>
    <p th:if="${#lists.isEmpty(animais)}">Nenhum animal encontrado.</p>
</div>
</body>
</html>
