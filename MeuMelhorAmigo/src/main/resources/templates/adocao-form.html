<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Solicitar adoção')}"></head>
<body>
<header th:replace="~{fragments/layout :: nav('animais')}"></header>

<main class="container page page-narrow">
    <a th:href="@{|/animais/${animal.id}|}" class="back-link"><span style="font-size:17px">←</span> Voltar ao animal</a>

    <div class="page-head">
        <div>
            <div class="eyebrow">Adoção responsável</div>
            <h1>Solicitar adoção</h1>
        </div>
    </div>

    <!-- mini-card do animal -->
    <div class="card" style="display:flex;gap:16px;padding:16px;align-items:center;margin-bottom:20px">
        <div class="photo" style="width:88px;height:88px;border-radius:14px;flex:none"
             th:style="|--ph-a:${#view.speciesPhA(animal.especie)};--ph-b:${#view.speciesPhB(animal.especie)};width:88px;height:88px;border-radius:14px;flex:none|">
            <img th:if="${animal.foto != null}" th:src="@{${animal.foto}}" alt="foto"/>
            <span th:unless="${animal.foto != null}" class="glyph" style="font-size:36px" th:text="${#view.speciesGlyph(animal.especie)}">🐾</span>
        </div>
        <div style="flex:1">
            <div style="display:flex;align-items:center;gap:9px;margin-bottom:4px">
                <h3 style="font-size:19px" th:text="${#view.nomeOuPadrao(animal)}">Animal</h3>
                <span class="badge" th:classappend="${#view.statusClass(animal.status)}">
                    <span class="bdot"></span><span th:text="${#view.statusLabel(animal.status)}">Status</span>
                </span>
            </div>
            <div class="meta">
                <span th:text="${#view.speciesLabel(animal.especie)}">Cão</span><span class="sep"></span>
                <span th:text="${animal.raca}">Raça</span><span class="sep"></span>
                <span th:text="${animal.sexo}">Sexo</span>
            </div>
            <div class="meta" style="margin-top:3px"><span th:text="'📍 ' + ${animal.local}">Local</span></div>
        </div>
    </div>

    <form method="post" th:action="@{|/adocao/solicitar/${animal.id}|}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="card card-pad">
            <div class="field">
                <label>Por que você quer adotar?</label>
                <textarea class="inp" name="motivacao" style="min-height:140px" minlength="20" required
                          placeholder="Ex.: Moro em casa com quintal, tenho experiência com cães e tempo para dedicar…"></textarea>
                <span class="hint">Fale sobre seu espaço, rotina e experiência com animais. Isso ajuda o responsável a decidir. (mínimo 20 caracteres)</span>
            </div>

            <div style="display:flex;align-items:center;gap:11px;padding:12px 14px;background:var(--surface-2);border-radius:11px;margin-bottom:18px" th:if="${animal.responsavel != null}">
                <span class="avatar" style="width:38px;height:38px;font-size:15px"
                      th:style="|background:${#view.avatarColor(animal.responsavel.nome)};width:38px;height:38px;font-size:15px|"
                      th:text="${#view.initials(animal.responsavel.nome)}">RS</span>
                <div style="font-size:13.5px">
                    <b th:text="${animal.responsavel.nome}">Responsável</b>
                    <div class="muted">receberá e avaliará sua solicitação</div>
                </div>
            </div>

            <div style="display:flex;gap:12px">
                <a th:href="@{|/animais/${animal.id}|}" class="btn btn-ghost btn-lg">Cancelar</a>
                <button type="submit" class="btn btn-primary btn-lg" style="flex:1">Enviar solicitação</button>
            </div>
        </div>
    </form>
</main>

<footer th:replace="~{fragments/layout :: foot}"></footer>
</body>
</html>
